# Render deployment configuration for Voice Transcriber
# Deploys as a static site — zero server cost, scales automatically.
# API key stays in the user's browser (localStorage); our infra never touches it.

services:
  - type: web
    name: voice-transcriber
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # SPA routing — all paths serve index.html so React Router works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Security headers
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      # Cache busting for HTML (never cache index.html)
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      # Long cache for hashed assets (JS/CSS bundles have content hashes)
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
